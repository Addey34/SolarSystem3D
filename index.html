<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Solar System | Three.js</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <!-- ─── Loading screen ─────────────────────────────────────────────────── -->
    <div id="loader">
      <div class="loader-content">
        <h2>Loading Solar System...</h2>
        <div class="progress-bar">
          <div class="progress" id="load-progress"></div>
        </div>
        <div id="load-status">Initializing...</div>
      </div>
    </div>

    <!-- ─── Planet navigation (top) ────────────────────────────────────────── -->
    <!-- Seule la Vue Globale est statique : les boutons de corps sont générés depuis
         le catalogue (CELESTIAL_CONFIG) par buildPlanetButtons() dans MainSolarSystemApp. -->
    <nav class="controls">
      <button
        aria-label="Overview"
        id="orbit-overview"
        class="button is-active"
      >
        Overview
      </button>
    </nav>

    <!-- ─── Mode toggle (bottom-left) ──────────────────────────────────────── -->
    <div id="mode-controls">
      <div class="mode-seg" role="group" aria-label="View mode">
        <button
          class="mode-btn is-active"
          data-mode="educ"
          title="Educational view — circular orbits"
        >
          Educ.
        </button>
        <button
          class="mode-btn"
          data-mode="explo"
          title="Exploration mode — true scale, space voyage"
        >
          Explo.
        </button>
      </div>
    </div>

    <!-- ─── Time panel (bottom-center) ─────────────────────────────────────── -->
    <div id="time-panel">
      <!-- Ligne 1 : play/pause | vitesse centrée | reset — toujours visible -->
      <div id="playback-row">
        <button id="play-pause-btn" class="tp-btn tp-play" title="Play / Pause">
          <svg width="11" height="13" viewBox="0 0 11 13" fill="currentColor">
            <rect x="0" y="0" width="3.8" height="13" rx="1.4" />
            <rect x="7.2" y="0" width="3.8" height="13" rx="1.4" />
          </svg>
        </button>
        <div class="tp-flex1"></div>
        <div class="speed-group">
          <button class="tp-btn tp-speed is-active">Live</button>
          <button class="tp-btn tp-speed">1h/s</button>
          <button class="tp-btn tp-speed">3h/s</button>
          <button class="tp-btn tp-speed">6h/s</button>
        </div>
        <div class="tp-flex1"></div>
        <button
          id="time-today"
          class="tp-btn tp-reset-inline"
          title="Back to now"
        >
          ⟳
        </button>
      </div>

      <!-- Panneau date/heure — mode réaliste uniquement -->
      <div id="datetime-panel">
        <!--
          L'input time EST l'affichage : molette desktop = ±1h,
          clic/tap = picker natif du système (roue iOS, material Android).
          lang="en-GB" transmis depuis <html> → Chrome affiche en 24h.
        -->
        <div id="clock-row">
          <span class="tp-live-dot" id="live-dot"></span>
          <input
            type="time"
            id="time-input"
            class="tp-clock-input"
            step="1"
            title="Wheel: ±1 h  ·  Click: pick the time"
          />
          <span class="disp-utc">UTC</span>
        </div>

        <!-- Idem pour la date : molette = ±1 jour, clic = calendar picker -->
        <div id="calendar-row">
          <input
            type="date"
            id="date-input"
            class="tp-date-input"
            title="Wheel: ±1 day  ·  Click: pick the date"
          />
        </div>
      </div>
      <!-- #datetime-panel -->
    </div>
    <!-- #time-panel -->

    <!-- ─── Crédits & licence (bottom-right, à gauche du plein écran) ───────── -->
    <!-- Icône discrète : tout le contenu (copyright, licence, crédits, futur don)
         vit dans le popover ci-dessous pour garder la scène 3D épurée. -->
    <button
      id="credits-btn"
      title="Credits & license"
      aria-label="Credits and license"
      aria-haspopup="dialog"
      aria-expanded="false"
    >
      ⓘ
    </button>
    <div
      id="credits-popover"
      role="dialog"
      aria-label="Credits and license"
      hidden
    >
      <h3 class="credits-title">Solar System Voyage</h3>
      <p class="credits-copy">© 2026 Adrian34</p>
      <dl class="credits-list">
        <dt>Code</dt>
        <dd>
          <a
            href="https://polyformproject.org/licenses/noncommercial/1.0.0"
            target="_blank"
            rel="noopener noreferrer"
            >PolyForm Noncommercial 1.0.0</a
          >
        </dd>
        <dt>Textures</dt>
        <dd>Solar System Scope (CC BY 4.0) · NASA imagery</dd>
        <dt>Data</dt>
        <dd>Astronomy Engine · JPL Small-Body Database</dd>
      </dl>
      <a
        class="credits-donate"
        href="https://ko-fi.com/adrian34"
        target="_blank"
        rel="noopener noreferrer"
      >
        ♥ Support the project
      </a>
    </div>

    <!-- ─── Fullscreen (bottom-right) ──────────────────────────────────────── -->
    <button id="fullscreen-btn" title="Fullscreen">⛶</button>

    <script type="module" src="/src/MainSolarSystemApp.ts"></script>
  </body>
</html>
