<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Solar System | Three.js</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <!-- ─── Loading screen ─────────────────────────────────────────────────── -->
    <div id="loader">
      <div class="loader-content">
        <h2>Loading Solar System...</h2>
        <div class="progress-bar">
          <div class="progress" id="load-progress"></div>
        </div>
        <div id="load-status">Initializing...</div>
      </div>
    </div>

    <!-- ─── Planet navigation (top) ────────────────────────────────────────── -->
    <nav class="controls">
      <button aria-label="Globale" id="orbit-overview" class="button is-active">Globale</button>
      <button aria-label="Sun"     id="orbit-sun"     class="button">Sun</button>
      <button aria-label="Mercury" id="orbit-mercury" class="button">Mercury</button>
      <button aria-label="Venus"   id="orbit-venus"   class="button">Venus</button>
      <button aria-label="Earth"   id="orbit-earth"   class="button">Earth</button>
      <button aria-label="Moon"    id="orbit-moon"    class="button">Moon</button>
      <button aria-label="Mars"    id="orbit-mars"    class="button">Mars</button>
      <button aria-label="Jupiter" id="orbit-jupiter" class="button">Jupiter</button>
      <button aria-label="Saturn"  id="orbit-saturn"  class="button">Saturn</button>
      <button aria-label="Uranus"  id="orbit-uranus"  class="button">Uranus</button>
      <button aria-label="Neptune" id="orbit-neptune" class="button">Neptune</button>
    </nav>

    <!-- ─── Mode toggle (bottom-left) ──────────────────────────────────────── -->
    <div id="mode-controls">
      <div class="mode-seg" role="group" aria-label="Mode de visualisation">
        <button class="mode-btn is-active" data-mode="education"  title="Vue éducative — orbites circulaires">Éduc.</button>
        <button class="mode-btn"           data-mode="exploration" disabled aria-disabled="true" title="Mode exploration — bientôt disponible">Explo.</button>
      </div>
    </div>

    <!-- ─── Time panel (bottom-center) ─────────────────────────────────────── -->
    <div id="time-panel">

      <!-- Ligne 1 : play/pause | vitesse centrée | reset — toujours visible -->
      <div id="playback-row">
        <button id="play-pause-btn" class="tp-btn tp-play" title="Play / Pause">
          <svg width="11" height="13" viewBox="0 0 11 13" fill="currentColor">
            <rect x="0"   y="0" width="3.8" height="13" rx="1.4"/>
            <rect x="7.2" y="0" width="3.8" height="13" rx="1.4"/>
          </svg>
        </button>
        <div class="tp-flex1"></div>
        <div class="speed-group">
          <button class="tp-btn tp-speed is-active">Réel</button>
          <button class="tp-btn tp-speed">1h/s</button>
          <button class="tp-btn tp-speed">3h/s</button>
          <button class="tp-btn tp-speed">6h/s</button>
        </div>
        <div class="tp-flex1"></div>
        <button id="time-today" class="tp-btn tp-reset-inline" title="Retour au présent">⟳</button>
      </div>

      <!-- Panneau date/heure — mode réaliste uniquement -->
      <div id="datetime-panel">

        <!--
          L'input time EST l'affichage : molette desktop = ±1h,
          clic/tap = picker natif du système (roue iOS, material Android).
          lang="fr" transmis depuis <html> → Chrome affiche en 24h.
        -->
        <div id="clock-row">
          <span class="tp-live-dot" id="live-dot"></span>
          <input type="time" id="time-input" class="tp-clock-input" step="1"
                 title="Molette : ±1 h  ·  Clic : choisir l'heure" />
          <span class="disp-utc">UTC</span>
        </div>

        <!-- Idem pour la date : molette = ±1 jour, clic = calendar picker -->
        <div id="calendar-row">
          <input type="date" id="date-input" class="tp-date-input"
                 title="Molette : ±1 jour  ·  Clic : choisir la date" />
        </div>

      </div><!-- #datetime-panel -->

    </div><!-- #time-panel -->

    <!-- ─── Fullscreen (bottom-right) ──────────────────────────────────────── -->
    <button id="fullscreen-btn" title="Fullscreen">⛶</button>

    <script type="module" src="/src/MainSolarSystemApp.ts"></script>
  </body>
</html>
